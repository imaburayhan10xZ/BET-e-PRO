<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="fav-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>
  
  <!-- Outer Shield / Hexagon -->
  <polygon points="50,6 92,30 92,76 50,94 8,76 8,30" fill="#021813" stroke="url(#fav-grad)" stroke-width="5" stroke-linejoin="round" />
  
  <!-- Stylized B and Crown -->
  <g transform="translate(1, 4)">
    <path d="M38,25 H57 C64,25 68,28 68,33 C68,37 64,40 57,40 H38 Z M38,40 H59 C66,40 70,43 70,49 C70,55 66,58 59,58 H38 Z" fill="url(#fav-grad)" />
    <!-- Vertical Spine of B -->
